services:
  jenkins:
    build:
      context: ./jenkins
    container_name: kankuama-jenkins
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - kankuama-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: kankuama-backend:latest
    container_name: kankuama-backend
    ports:
      - "4000:4000"
    networks:
      - kankuama-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: kankuama-frontend:latest
    container_name: kankuama-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - kankuama-network
    environment:
      - REACT_APP_API_URL=http://localhost:4000
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    container_name: kankuama-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - kankuama-network
    restart: unless-stopped

volumes:
  jenkins_home:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_logs:
    driver: local
  sonarqube_extensions:
    driver: local

networks:
  kankuama-network:
    driver: bridge
